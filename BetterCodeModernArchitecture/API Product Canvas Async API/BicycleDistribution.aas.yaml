asyncapi: 3.0.0
info:
  title: Bicycle Distribution
  version: 1.0.0
  description: |
    Events produced and consumed by the Bicycle Distribution service.

    The service produces the following domain events:
      - Bicycle Distributed
      - Bicycle Searched
      - Bicycle Booked
      - Bicycle Returned
      - Bicycle Picked Up

    The service consumes the following domain events:
      - Bicycle Locked
      - Bicycle Unlocked

    Quality requirements:
      - System supports approximately 10,000 bicycles and 100 racks
      - Search operations must complete within 2 seconds
      - Booking operations must complete within 5 seconds

    Note: It must be decided whether to create a separated booking bounded context.
  contact:
    name: Ferdinand Ade, Annegret Junker
    url: https://bicycle-sharing.org
    email: ferdinand.ade@bicycle-sharing.org
  x-api-id: a3c8f2d1-7e45-4b89-9c01-2f3a4e5d6b7c

servers:
  event-broker-bicycle-sharing:
    host: broker.bicycle-sharing.org:8092
    protocol: kafka
    description: Event broker of the bicycle sharing platform
    security:
      - $ref: '#/components/securitySchemes/user-password'
    bindings:
      kafka:
        schemaRegistryUrl: 'https://bicycle-sharing-schema-registry.com'
        schemaRegistryVendor: 'confluent'
        bindingVersion: '0.5.0'

channels:
  BicycleDistributedChannel:
    description: Channel where messages are stored when a bicycle was distributed to a rack
    address: bicycle-distributed
    messages:
      BicycleDistributedEvent:
        $ref: '#/components/messages/BicycleDistributedSend'
    bindings:
      kafka:
        topic: 'bicycle-distributed-event-channel'
        bindingVersion: '0.5.0'

  BicycleSearchedChannel:
    description: Channel where messages are stored when a bicycle search was performed
    address: bicycle-searched
    messages:
      BicycleSearchedEvent:
        $ref: '#/components/messages/BicycleSearchedSend'
    bindings:
      kafka:
        topic: 'bicycle-searched-event-channel'
        bindingVersion: '0.5.0'

  BicycleBookedChannel:
    description: Channel where messages are stored when a bicycle was booked by a commuter
    address: bicycle-booked
    messages:
      BicycleBookedEvent:
        $ref: '#/components/messages/BicycleBookedSend'
    bindings:
      kafka:
        topic: 'bicycle-booked-event-channel'
        bindingVersion: '0.5.0'

  BicycleReturnedChannel:
    description: Channel where messages are stored when a bicycle was returned to a rack
    address: bicycle-returned
    messages:
      BicycleReturnedEvent:
        $ref: '#/components/messages/BicycleReturnedSend'
    bindings:
      kafka:
        topic: 'bicycle-returned-event-channel'
        bindingVersion: '0.5.0'

  BicyclePickedUpChannel:
    description: Channel where messages are stored when a bicycle was picked up from a rack
    address: bicycle-picked-up
    messages:
      BicyclePickedUpEvent:
        $ref: '#/components/messages/BicyclePickedUpSend'
    bindings:
      kafka:
        topic: 'bicycle-picked-up-event-channel'
        bindingVersion: '0.5.0'

  BicycleLockedChannel:
    description: Channel where messages are stored when a bicycle was locked at a rack
    address: bicycle-locked
    messages:
      BicycleLockedEvent:
        $ref: '#/components/messages/BicycleLockedReceive'
    bindings:
      kafka:
        topic: 'bicycle-locked-event-channel'
        bindingVersion: '0.5.0'

  BicycleUnlockedChannel:
    description: Channel where messages are stored when a bicycle was unlocked from a rack
    address: bicycle-unlocked
    messages:
      BicycleUnlockedEvent:
        $ref: '#/components/messages/BicycleUnlockedReceive'
    bindings:
      kafka:
        topic: 'bicycle-unlocked-event-channel'
        bindingVersion: '0.5.0'

operations:
  BicycleDistributedSendOperation:
    action: send
    channel:
      $ref: '#/channels/BicycleDistributedChannel'
    bindings:
      kafka:
        bindingVersion: '0.5.0'
        groupId:
          type: string
          pattern: ^cg-bicycle-distributed-.*$

  BicycleSearchedSendOperation:
    action: send
    channel:
      $ref: '#/channels/BicycleSearchedChannel'
    bindings:
      kafka:
        bindingVersion: '0.5.0'
        groupId:
          type: string
          pattern: ^cg-bicycle-searched-.*$

  BicycleBookedSendOperation:
    action: send
    channel:
      $ref: '#/channels/BicycleBookedChannel'
    bindings:
      kafka:
        bindingVersion: '0.5.0'
        groupId:
          type: string
          pattern: ^cg-bicycle-booked-.*$

  BicycleReturnedSendOperation:
    action: send
    channel:
      $ref: '#/channels/BicycleReturnedChannel'
    bindings:
      kafka:
        bindingVersion: '0.5.0'
        groupId:
          type: string
          pattern: ^cg-bicycle-returned-.*$

  BicyclePickedUpSendOperation:
    action: send
    channel:
      $ref: '#/channels/BicyclePickedUpChannel'
    bindings:
      kafka:
        bindingVersion: '0.5.0'
        groupId:
          type: string
          pattern: ^cg-bicycle-picked-up-.*$

  BicycleLockedReceiveOperation:
    action: receive
    channel:
      $ref: '#/channels/BicycleLockedChannel'
    bindings:
      kafka:
        bindingVersion: '0.5.0'
        groupId:
          type: string
          pattern: ^cg-bicycle-locked-.*$

  BicycleUnlockedReceiveOperation:
    action: receive
    channel:
      $ref: '#/channels/BicycleUnlockedChannel'
    bindings:
      kafka:
        bindingVersion: '0.5.0'
        groupId:
          type: string
          pattern: ^cg-bicycle-unlocked-.*$

components:
  messages:
    BicycleDistributedSend:
      name: BicycleDistributed
      title: Bicycle Distributed Event
      summary: Emitted when a bicycle has been distributed to a rack
      headers:
        $ref: '#/components/schemas/MessageHeader'
      payload:
        $ref: '#/components/schemas/Bicycle'

    BicycleSearchedSend:
      name: BicycleSearched
      title: Bicycle Searched Event
      summary: Emitted when a search for an available bicycle was performed
      headers:
        $ref: '#/components/schemas/MessageHeader'
      payload:
        $ref: '#/components/schemas/Bicycle'

    BicycleBookedSend:
      name: BicycleBooked
      title: Bicycle Booked Event
      summary: Emitted when a bicycle was successfully booked by a commuter
      headers:
        $ref: '#/components/schemas/MessageHeader'
      payload:
        $ref: '#/components/schemas/Bicycle'

    BicycleReturnedSend:
      name: BicycleReturned
      title: Bicycle Returned Event
      summary: Emitted when a bicycle was returned to a rack
      headers:
        $ref: '#/components/schemas/MessageHeader'
      payload:
        $ref: '#/components/schemas/Bicycle'

    BicyclePickedUpSend:
      name: BicyclePickedUp
      title: Bicycle Picked Up Event
      summary: Emitted when a bicycle was picked up from a rack by a commuter
      headers:
        $ref: '#/components/schemas/MessageHeader'
      payload:
        $ref: '#/components/schemas/Bicycle'

    BicycleLockedReceive:
      name: BicycleLocked
      title: Bicycle Locked Event
      summary: Consumed when a bicycle has been locked at a rack
      headers:
        $ref: '#/components/schemas/MessageHeader'
      payload:
        $ref: '#/components/schemas/Bicycle'

    BicycleUnlockedReceive:
      name: BicycleUnlocked
      title: Bicycle Unlocked Event
      summary: Consumed when a bicycle has been unlocked from a rack
      headers:
        $ref: '#/components/schemas/MessageHeader'
      payload:
        $ref: '#/components/schemas/Bicycle'

  schemas:

    Bicycle:
      description: A bicycle managed within the Bicycle Distribution bounded context
      type: object
      required:
        - bicycleId
        - status
      properties:
        bicycleId:
          description: Unique identifier of the bicycle
          type: string
          format: uuid
          examples:
            - d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f9a
        location:
          $ref: '#/components/schemas/Location'
        status:
          $ref: '#/components/schemas/BicycleStatus'

    Location:
      description: Geographical location of a bicycle or rack, typically a public transport station
      type: object
      required:
        - locationId
      properties:
        locationId:
          description: Unique identifier of the location
          type: string
          format: uuid
          examples:
            - a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          description: Human-readable name of the location, e.g. a station or public transport stop
          type: string
          minLength: 2
          maxLength: 100
          examples:
            - Central Station Rack A
            - Marienplatz U-Bahn
        latitude:
          description: Geographical latitude of the location in decimal degrees
          type: number
          format: double
          minimum: -90
          maximum: 90
          examples:
            - 48.1374
        longitude:
          description: Geographical longitude of the location in decimal degrees
          type: number
          format: double
          minimum: -180
          maximum: 180
          examples:
            - 11.5755

    BicycleStatus:
      description: |
        Current status of a bicycle within the Bicycle Distribution bounded context.
          - BOOKABLE: The bicycle is available and can be booked by a commuter
          - BOOKED: The bicycle has been reserved by a commuter
          - UNLOCKED: The bicycle has been unlocked and is in active use
          - LOCKED: The bicycle is locked at a rack
      type: string
      x-extensible-enum:
        - BOOKABLE
        - BOOKED
        - UNLOCKED
        - LOCKED
      examples:
        - BOOKABLE

    MessageHeader:
      description: Header information included with every event message
      type: object
      required:
        - correlationId
        - messageId
        - x-api-identifier
        - x-api-version
      properties:
        correlationId:
          description: Identifier set by the application to trace the end-to-end API journey
          type: string
          format: uuid
          examples:
            - b3416449-5f69-4cd2-a6c4-1ff82da96bce
        messageId:
          description: Unique identifier for this particular message, required for cascading infrastructure deduplication
          type: string
          format: uuid
          examples:
            - 5a1d305b-19f3-46eb-ada1-9a9770e56fd1
        x-api-identifier:
          description: Identifier of the API that produced this message
          type: string
          format: uuid
          default: a3c8f2d1-7e45-4b89-9c01-2f3a4e5d6b7c
          examples:
            - a3c8f2d1-7e45-4b89-9c01-2f3a4e5d6b7c
        x-api-version:
          description: Version of the API that produced this message
          type: string
          x-extensible-enum:
            - 1.0.0
          default: 1.0.0
          examples:
            - 1.0.0
        source:
          description: Name of the application that created the message
          type: string
          minLength: 2
          maxLength: 30
          examples:
            - BicycleDistribution

  securitySchemes:
    user-password:
      type: userPassword
      description: Username and password security scheme for Kafka event broker authentication
